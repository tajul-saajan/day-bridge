openapi: 3.0.3
info:
  title: DayBridge API
  version: "1.0.0"
  description: >
    Server-side API for the DayBridge productivity dashboard. Proxies Jira,
    produces AI daily briefings via Claude, and exposes a health check.
    All endpoints require an authenticated caller (Azure AD bearer token) except
    /health. Errors use the RFC 9457 envelope (WSD-011).
servers:
  - url: /api

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Traceparent:
      name: traceparent
      in: header
      required: false
      description: W3C Trace Context. Generated by the service if absent.
      schema:
        type: string
        example: 00-0af7651916cd43dd8448eb211c80319c-b7ad6b7169203331-01
  schemas:
    Problem:
      type: object
      description: RFC 9457 error envelope (WSD-011).
      properties:
        error:
          type: object
          properties:
            type:
              type: string
              enum: [validation, authentication, authorisation, not-found, conflict, rate-limit, server]
            code:      { type: string, example: FIELD_VALIDATION_FAILED }
            message:   { type: string }
            timestamp: { type: string, format: date-time }
            params:    { type: object, additionalProperties: true }
            details:   { type: array, items: { type: object } }
          required: [type, code, message, timestamp]
    JiraTicketsResponse:
      type: object
      properties:
        issues:    { type: array, items: { type: object, additionalProperties: true } }
        total:     { type: integer }
        queryUser: { type: string }
        authEmail: { type: string }
        error:     { type: string, nullable: true }
    SummarizeRequest:
      type: object
      properties:
        tasks:  { type: array, items: { type: object, additionalProperties: true } }
        emails: { type: array, items: { type: object, additionalProperties: true } }
    SummarizeResponse:
      type: object
      properties:
        summary:    { type: string }
        focusOrder: { type: array, items: { type: string } }
        blockers:   { type: array, items: { type: string } }
    Health:
      type: object
      properties:
        status:  { type: string, enum: [pass, warn, fail] }
        version: { type: string }
        checks:
          type: object
          additionalProperties:
            type: object
            properties:
              status: { type: string, enum: [pass, warn, fail] }
  responses:
    Problem:
      description: RFC 9457 error
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }

paths:
  /jira-tickets:
    get:
      summary: List the caller's open Jira tickets
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/Traceparent'
        - name: user
          in: query
          required: false
          description: Account identifier to query (defaults to the authenticated caller).
          schema:
            type: string
            pattern: '^[A-Za-z0-9._%+\-@]{1,128}$'
      responses:
        '200':
          description: Tickets for the queried user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/JiraTicketsResponse' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
        '502': { $ref: '#/components/responses/Problem' }

  /summarize:
    post:
      summary: Generate an AI daily briefing from tasks and emails
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/Traceparent'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SummarizeRequest' }
      responses:
        '200':
          description: Daily briefing
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SummarizeResponse' }
        '400': { $ref: '#/components/responses/Problem' }
        '401': { $ref: '#/components/responses/Problem' }
        '405': { $ref: '#/components/responses/Problem' }
        '500': { $ref: '#/components/responses/Problem' }
        '502': { $ref: '#/components/responses/Problem' }

  /health:
    get:
      summary: Service health check
      parameters:
        - $ref: '#/components/parameters/Traceparent'
      responses:
        '200':
          description: Service is healthy (pass or warn)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }
        '503':
          description: Service is unhealthy (fail)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }
