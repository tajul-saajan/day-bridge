<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DayBridge</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="6" fill="#0078D4"/>
          <path d="M7 14L12 19L21 9" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="logo-text">DayBridge</span>
      </div>
    </div>
    <div class="header-right">
      <div id="dateDisplay" class="date-display"></div>
      <button id="loginBtn" class="btn btn-primary" onclick="handleLogin()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1a4 4 0 1 1 0 8A4 4 0 0 1 8 1zm0 9c-4.42 0-7 2.24-7 3.5V15h14v-1.5C15 12.24 12.42 10 8 10z" fill="currentColor"/></svg>
        Sign in with Microsoft
      </button>
      <div id="userInfo" class="user-info hidden">
        <div class="user-avatar" id="userAvatar">U</div>
        <span id="userName" class="user-name"></span>
        <button class="btn btn-ghost" onclick="handleLogout()">Sign out</button>
      </div>
    </div>
  </header>

  <!-- Status Bar -->
  <div id="statusBar" class="status-bar hidden">
    <div class="status-item">
      <span class="status-dot online"></span>
      <span id="statusText">Connected</span>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="loadLiveData()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 7a6 6 0 1 0 2-4.47" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M1 2v3h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Refresh
    </button>
    <span id="lastUpdated" class="last-updated"></span>
  </div>

  <!-- Main Layout -->
  <main class="main">

    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-icon" style="background:#fde8ea">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="#d92b3a" stroke-width="1.5"/><circle cx="10" cy="10" r="3" fill="#d92b3a"/></svg>
        </div>
        <div>
          <div class="stat-number stat-blue" id="statOpenTickets">0</div>
          <div class="stat-label">Open Tickets</div>
        </div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#e3f5eb">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="16" height="16" rx="4" fill="#0e7a3c"/><path d="M6 10l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div>
          <div class="stat-number stat-green" id="statDoneToday">0</div>
          <div class="stat-label">Done Today</div>
        </div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#e6edfa">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="2" y="4" width="16" height="14" rx="2" stroke="#0052CC" stroke-width="1.5"/><path d="M2 8h16M7 2v4M13 2v4" stroke="#0052CC" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
        <div>
          <div class="stat-number stat-blue" id="statMeetings">0</div>
          <div class="stat-label">Meetings</div>
        </div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#f0edff">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="2" y="5" width="16" height="12" rx="2" stroke="#7B61FF" stroke-width="1.5"/><path d="M2 8l8 5 8-5" stroke="#7B61FF" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
        <div>
          <div class="stat-number stat-orange" id="statEmails">0</div>
          <div class="stat-label">Unread Emails</div>
        </div>
      </div>
    </div>

    <!-- AI Summary Strip -->
    <div class="ai-strip" id="aiBanner">
      <div class="ai-strip-icon">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="#7B61FF" stroke-width="1.5"/><path d="M7 10h6M10 7v6" stroke="#7B61FF" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <span class="ai-strip-label">AI Summary</span>
      <p id="aiSummary" class="ai-strip-text">Sign in with Microsoft to get your AI-powered daily briefing.</p>
      <div id="aiBlockers" class="ai-strip-blockers hidden"></div>
    </div>

    <!-- Productivity Meter -->
    <div class="productivity-strip" id="productivityStrip">
      <div class="ps-label">Daily Productivity</div>
      <div class="ps-track">
        <div class="ps-fill" id="psFill" style="width:0%"></div>
      </div>
      <div class="ps-pct" id="psPct">—</div>
      <div class="ps-status" id="psStatus">Sign in to calculate</div>
      <div class="ps-chips" id="psChips"></div>
    </div>

    <!-- 3-Column Dashboard Grid -->
    <div class="dashboard-grid">

      <!-- Col 1: Jira Tasks -->
      <section class="card">
        <div class="card-header">
          <div class="card-title focus-title">
            <span class="focus-dot focus-dot-amber"></span>
            <span>Jira Tickets &mdash; Today's Focus</span>
          </div>
          <div class="card-header-right">
            <div class="filter-pills">
              <button class="filter-pill active" data-filter="all"      onclick="filterTasks('all')">All</button>
              <button class="filter-pill"        data-filter="critical" onclick="filterTasks('critical')">Critical</button>
              <button class="filter-pill"        data-filter="high"     onclick="filterTasks('high')">High</button>
              <button class="filter-pill"        data-filter="medium"   onclick="filterTasks('medium')">Medium</button>
            </div>
            <span id="taskCount" class="badge badge-blue">0</span>
          </div>
        </div>
        <div id="taskList" class="list-container"></div>
      </section>

      <!-- Col 2: Schedule column (today + weekly stacked) -->
      <div class="schedule-col">

        <!-- Today's Schedule -->
        <section class="card">
          <div class="card-header">
            <div class="card-title focus-title">
              <span class="focus-dot focus-dot-blue"></span>
              <span>Today's Schedule</span>
            </div>
            <span id="eventCount" class="badge badge-blue">0</span>
          </div>
          <div id="eventList" class="list-container"></div>
        </section>

        <!-- Weekly Overview -->
        <section class="card">
          <div class="card-header">
            <div class="card-title focus-title">
              <span class="focus-dot" style="background:#7B61FF"></span>
              <span>This Week</span>
            </div>
          </div>
          <div id="weeklyList" class="weekly-grid"></div>
        </section>

      </div>

      <!-- Col 3: Email Side Panel -->
      <section class="card email-panel">
        <div class="card-header">
          <div class="card-title focus-title">
            <span class="focus-dot" style="background:#c25000"></span>
            <span>Unread Emails</span>
          </div>
          <span id="emailCount" class="badge badge-red">0</span>
        </div>
        <div id="emailList" class="list-container"></div>
      </section>

    </div>
  </main>

  <!-- Loading Overlay -->
  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="spinner"></div>
    <p id="loadingText">Loading your data…</p>
  </div>

  <!-- MSAL — served locally for reliability -->
  <script src="/lib/msal-browser.min.js"></script>
  <script src="auth.js"></script>
  <script src="graph.js"></script>
  <script src="jira.js"></script>
  <script src="app.js"></script>
</body>
</html>
