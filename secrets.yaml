# WSD-007 — Sensitive Information and Secrets Management
# Secrets are injected at runtime via Azure Static Web Apps → Configuration
# today; HashiCorp Vault is the organisation's standard target. Setup and
# runtime credentials are kept separate per WSD-007.

service: daybridge
secrets:
  - name: jira-token
    path: kv/data/production/daybridge/jira-token
    description: Jira Cloud REST API token used by the server-side ticket proxy (env JIRA_TOKEN)
    owner: wsd-productivity
    rotation_days: 90

  - name: claude-api-key
    path: kv/data/production/daybridge/claude-api-key
    description: Anthropic Claude API key for daily-briefing summarisation (env CLAUDE_API_KEY)
    owner: wsd-productivity
    rotation_days: 90
